<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JinBo Launchpad</title>
    <meta name="color-scheme" content="light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260420-clock-inline" />
  </head>
  <body>
    <div class="wallpaper" aria-hidden="true">
      <div class="aurora aurora-1"></div>
      <div class="aurora aurora-2"></div>
      <div class="aurora aurora-3"></div>
      <div class="aurora aurora-4"></div>
      <div class="wallpaper-grain"></div>
    </div>

    <main class="desktop-shell">
      <section class="launchpad" aria-label="个人导航">
        <div class="glass-grain" aria-hidden="true"></div>
        <div class="glass-sheen" aria-hidden="true"></div>

        <header class="topbar">
          <div class="traffic-lights" aria-hidden="true">
            <button
              class="tl tl-close"
              tabindex="-1"
              aria-hidden="true"
            ></button>
            <button
              class="tl tl-minimize"
              tabindex="-1"
              aria-hidden="true"
            ></button>
            <button
              class="tl tl-maximize"
              tabindex="-1"
              aria-hidden="true"
            ></button>
          </div>

          <div class="title-block">
            <div class="title-text">
              <h1>JinBo LaunchPad</h1>
            </div>
          </div>

          <form class="search" role="search">
            <label class="sr-only" for="site-search">搜索网站</label>
            <svg class="search-icon" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="7" cy="7" r="5" />
              <line x1="10.6" y1="10.6" x2="14" y2="14" />
            </svg>
            <input
              id="site-search"
              type="search"
              placeholder="搜索"
              autocomplete="off"
              spellcheck="false"
            />
          </form>

          <button
            id="appearanceButton"
            class="icon-button more-button"
            type="button"
            aria-label="更多选项"
            aria-expanded="false"
            aria-controls="appearancePanel"
          >
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <circle cx="5" cy="10" r="1.5" />
              <circle cx="10" cy="10" r="1.5" />
              <circle cx="15" cy="10" r="1.5" />
            </svg>
          </button>
        </header>

        <section class="appearance-panel" id="appearancePanel" aria-label="外观设置" hidden>
          <div class="panel-section">
            <div class="panel-heading">
              <h2>背景位置</h2>
              <p>选择图片显示的焦点</p>
            </div>
            <div class="position-grid" id="bgPositionGrid" role="group" aria-label="背景图位置">
              <button type="button" data-bg-position="left top">左上</button>
              <button type="button" data-bg-position="center top">上</button>
              <button type="button" data-bg-position="right top">右上</button>
              <button type="button" data-bg-position="left center">左</button>
              <button type="button" data-bg-position="center center">中</button>
              <button type="button" data-bg-position="right center">右</button>
              <button type="button" data-bg-position="left bottom">左下</button>
              <button type="button" data-bg-position="center bottom">下</button>
              <button type="button" data-bg-position="right bottom">右下</button>
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-heading">
              <h2>毛玻璃透明度</h2>
              <p><span id="glassOpacityValue">28</span>%</p>
            </div>
            <label class="range-field">
              <span class="sr-only">调整毛玻璃透明度</span>
              <input
                id="glassOpacityInput"
                type="range"
                min="0"
                max="100"
                step="1"
                value="28"
              />
            </label>
          </div>
        </section>

        <nav class="category-bar" aria-label="分类筛选" id="categoryBar"></nav>

        <section class="status-row" aria-live="polite">
          <p id="resultCount">正在载入导航…</p>
          <div class="status-actions">
            <div class="beijing-clock" aria-live="off">
              <span id="beijingDate" class="clock-date"></span>
              <time id="beijingTime" datetime=""></time>
            </div>
            <button id="resetButton" type="button">
              <svg viewBox="0 0 12 12" aria-hidden="true">
                <path
                  d="M2 6h8M6 2l4 4-4 4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              查看全部
            </button>
          </div>
        </section>

        <section class="app-grid" id="appGrid" aria-label="网站列表"></section>

        <section class="empty-state" id="emptyState" hidden>
          <span class="empty-glyph" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <circle
                cx="28"
                cy="28"
                r="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
              />
              <line
                x1="42"
                y1="42"
                x2="54"
                y2="54"
                stroke="currentColor"
                stroke-width="2.8"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <h2>没有找到匹配的网站</h2>
          <p>换一个关键词，或点击“查看全部”回到初始页。</p>
        </section>
      </section>
    </main>

    <script src="./app.js?v=20260420-clock" defer></script>
  </body>
</html>
